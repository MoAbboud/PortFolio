<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TekTak Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tek-gradient {
            background: linear-gradient(92deg, #EE1D52, #69C9D0);
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <!-- Header -->
    <header class="tek-gradient shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-bold">
                    <i class="fas fa-crown mr-2"></i> TekTak Admin Panel
                </h1>
                <a href="index.html" class="bg-white text-gray-900 px-4 py-2 rounded-lg hover:bg-gray-100 transition">
                    <i class="fas fa-eye mr-2"></i> View Site
                </a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Quick Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-lg">
                <div class="text-gray-400 text-sm mb-1">Total Drama Stories</div>
                <div class="text-2xl font-bold" id="statsStories">0</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <div class="text-gray-400 text-sm mb-1">Trending Hashtags</div>
                <div class="text-2xl font-bold" id="statsHashtags">0</div>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <div class="text-gray-400 text-sm mb-1">Featured Creators</div>
                <div class="text-2xl font-bold" id="statsInfluencers">0</div>
            </div>
        </div>

        <!-- Add Drama Form -->
        <div class="bg-gray-800 rounded-xl shadow-xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <span class="text-2xl mr-2">🍿</span> Add Drama Story
            </h2>
            
            <form id="dramaForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Story Title *</label>
                    <input type="text" id="dramaTitle" required 
                        class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                        placeholder="e.g., Creator Exposed for Fake Pranks">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Description *</label>
                    <textarea id="dramaDescription" required rows="3"
                        class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                        placeholder="Brief summary of the drama..."></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Drama Type *</label>
                        <select id="dramaType" required
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none">
                            <option value="drama">Drama</option>
                            <option value="scandal">Scandal</option>
                            <option value="feud">Feud</option>
                            <option value="controversy">Controversy</option>
                            <option value="response">Response</option>
                            <option value="legal">Legal</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Creator Username *</label>
                        <input type="text" id="dramaAuthor" required
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="@username">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Hashtags (comma-separated)</label>
                    <input type="text" id="dramaHashtags"
                        class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                        placeholder="DramaAlert, Exposed, TeaTime">
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Likes</label>
                        <input type="text" id="dramaLikes"
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="2.4M">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Comments</label>
                        <input type="text" id="dramaComments"
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="45K">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Shares</label>
                        <input type="text" id="dramaShares"
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="12K">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-3 rounded-lg font-medium hover:from-pink-600 hover:to-blue-600 transition">
                    <i class="fas fa-plus mr-2"></i> Add Drama Story
                </button>
            </form>
        </div>

        <!-- Manage Existing Drama -->
        <div class="bg-gray-800 rounded-xl shadow-xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center justify-between">
                <span><span class="text-2xl mr-2">📋</span> Manage Stories</span>
                <button onclick="clearAllData()" class="text-sm bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-trash mr-2"></i> Clear All Data
                </button>
            </h2>
            
            <div id="dramaList" class="space-y-3">
                <!-- Drama items will be listed here -->
            </div>
        </div>

        <!-- Quick Add Hashtag -->
        <div class="bg-gray-800 rounded-xl shadow-xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <span class="text-2xl mr-2">🔥</span> Add Trending Hashtag
            </h2>
            
            <form id="hashtagForm" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Hashtag Name *</label>
                        <input type="text" id="hashtagName" required
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="#DramaAlert">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Type *</label>
                        <select id="hashtagType" required
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none">
                            <option value="drama">Drama</option>
                            <option value="scandal">Scandal</option>
                            <option value="feud">Feud</option>
                            <option value="controversy">Controversy</option>
                            <option value="response">Response</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Posts</label>
                        <input type="text" id="hashtagPosts"
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="2.4M">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Views</label>
                        <input type="text" id="hashtagViews"
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="1.2B">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-3 rounded-lg font-medium hover:from-pink-600 hover:to-blue-600 transition">
                    <i class="fas fa-plus mr-2"></i> Add Hashtag
                </button>
            </form>

            <div id="hashtagList" class="mt-6 space-y-2">
                <!-- Hashtags will be listed here -->
            </div>
        </div>

        <!-- Quick Add Influencer -->
        <div class="bg-gray-800 rounded-xl shadow-xl p-6 mb-8">
            <h2 class="text-2xl font-bold mb-6 flex items-center">
                <span class="text-2xl mr-2">👑</span> Add Tea Spiller
            </h2>
            
            <form id="influencerForm" class="space-y-4">
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Username *</label>
                        <input type="text" id="influencerUsername" required
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="@DramaQueenTV">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Followers</label>
                        <input type="text" id="influencerFollowers"
                            class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                            placeholder="8.2M">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Known For *</label>
                    <input type="text" id="influencerTrending" required
                        class="w-full bg-gray-700 rounded-lg px-4 py-2 focus:ring-2 focus:ring-pink-500 outline-none"
                        placeholder="Spilling ALL the tea">
                </div>

                <div class="flex items-center">
                    <input type="checkbox" id="influencerVerified" class="mr-2">
                    <label class="text-sm">Verified Account</label>
                </div>

                <button type="submit" 
                    class="w-full bg-gradient-to-r from-pink-500 to-blue-500 px-6 py-3 rounded-lg font-medium hover:from-pink-600 hover:to-blue-600 transition">
                    <i class="fas fa-plus mr-2"></i> Add Influencer
                </button>
            </form>

            <div id="influencerList" class="mt-6 space-y-2">
                <!-- Influencers will be listed here -->
            </div>
        </div>
    </main>

    <script>
        // Storage keys
        const STORAGE_KEYS = {
            DRAMA: 'tektakDrama',
            HASHTAGS: 'tektakHashtags',
            INFLUENCERS: 'tektakInfluencers'
        };

        // Load data from localStorage or return empty array
        function loadData(key) {
            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : [];
        }

        // Save data to localStorage
        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
            updateStats();
            renderAll();
        }

        // Update statistics
        function updateStats() {
            document.getElementById('statsStories').textContent = loadData(STORAGE_KEYS.DRAMA).length;
            document.getElementById('statsHashtags').textContent = loadData(STORAGE_KEYS.HASHTAGS).length;
            document.getElementById('statsInfluencers').textContent = loadData(STORAGE_KEYS.INFLUENCERS).length;
        }

        // Drama form handler
        document.getElementById('dramaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const drama = {
                id: Date.now(),
                title: document.getElementById('dramaTitle').value,
                description: document.getElementById('dramaDescription').value,
                type: document.getElementById('dramaType').value,
                authorUsername: document.getElementById('dramaAuthor').value,
                hashtags: document.getElementById('dramaHashtags').value.split(',').map(h => h.trim()).filter(h => h),
                likes: document.getElementById('dramaLikes').value || '0',
                comments: document.getElementById('dramaComments').value || '0',
                shares: document.getElementById('dramaShares').value || '0',
                timestamp: new Date().toISOString()
            };

            const dramaData = loadData(STORAGE_KEYS.DRAMA);
            dramaData.unshift(drama); // Add to beginning
            saveData(STORAGE_KEYS.DRAMA, dramaData);

            e.target.reset();
            showNotification('Drama story added! 🍿');
        });

        // Hashtag form handler
        document.getElementById('hashtagForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const hashtag = {
                id: Date.now(),
                name: document.getElementById('hashtagName').value,
                type: document.getElementById('hashtagType').value,
                posts: document.getElementById('hashtagPosts').value || '0',
                views: document.getElementById('hashtagViews').value || '0'
            };

            const hashtagData = loadData(STORAGE_KEYS.HASHTAGS);
            hashtagData.unshift(hashtag);
            saveData(STORAGE_KEYS.HASHTAGS, hashtagData);

            e.target.reset();
            showNotification('Hashtag added! 🔥');
        });

        // Influencer form handler
        document.getElementById('influencerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const influencer = {
                id: Date.now(),
                username: document.getElementById('influencerUsername').value,
                followers: document.getElementById('influencerFollowers').value || '0',
                trending_for: document.getElementById('influencerTrending').value,
                verified: document.getElementById('influencerVerified').checked
            };

            const influencerData = loadData(STORAGE_KEYS.INFLUENCERS);
            influencerData.unshift(influencer);
            saveData(STORAGE_KEYS.INFLUENCERS, influencerData);

            e.target.reset();
            showNotification('Influencer added! 👑');
        });

        // Delete item
        function deleteItem(key, id) {
            if (!confirm('Are you sure you want to delete this item?')) return;
            
            const data = loadData(key);
            const filtered = data.filter(item => item.id !== id);
            saveData(key, filtered);
            showNotification('Item deleted!');
        }

        // Clear all data
        function clearAllData() {
            if (!confirm('⚠️ This will delete ALL data. Are you sure?')) return;
            
            localStorage.removeItem(STORAGE_KEYS.DRAMA);
            localStorage.removeItem(STORAGE_KEYS.HASHTAGS);
            localStorage.removeItem(STORAGE_KEYS.INFLUENCERS);
            
            updateStats();
            renderAll();
            showNotification('All data cleared!');
        }

        // Render drama list
        function renderDramaList() {
            const container = document.getElementById('dramaList');
            const data = loadData(STORAGE_KEYS.DRAMA);
            
            if (data.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-8">No drama stories yet. Add one above! 👆</p>';
                return;
            }

            container.innerHTML = data.map(drama => `
                <div class="bg-gray-700 p-4 rounded-lg flex justify-between items-start">
                    <div class="flex-1">
                        <h4 class="font-bold">${drama.title}</h4>
                        <p class="text-sm text-gray-400 mt-1">${drama.type} • ${drama.authorUsername}</p>
                    </div>
                    <button onclick="deleteItem('${STORAGE_KEYS.DRAMA}', ${drama.id})" 
                        class="text-red-400 hover:text-red-300 ml-4">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // Render hashtag list
        function renderHashtagList() {
            const container = document.getElementById('hashtagList');
            const data = loadData(STORAGE_KEYS.HASHTAGS);
            
            if (data.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">No hashtags yet.</p>';
                return;
            }

            container.innerHTML = data.map(hashtag => `
                <div class="bg-gray-700 p-3 rounded-lg flex justify-between items-center">
                    <div>
                        <span class="font-bold">${hashtag.name}</span>
                        <span class="text-sm text-gray-400 ml-2">${hashtag.type}</span>
                    </div>
                    <button onclick="deleteItem('${STORAGE_KEYS.HASHTAGS}', ${hashtag.id})" 
                        class="text-red-400 hover:text-red-300">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // Render influencer list
        function renderInfluencerList() {
            const container = document.getElementById('influencerList');
            const data = loadData(STORAGE_KEYS.INFLUENCERS);
            
            if (data.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center py-4">No influencers yet.</p>';
                return;
            }

            container.innerHTML = data.map(influencer => `
                <div class="bg-gray-700 p-3 rounded-lg flex justify-between items-center">
                    <div>
                        <span class="font-bold">${influencer.username}</span>
                        ${influencer.verified ? '<i class="fas fa-check-circle text-blue-400 ml-1"></i>' : ''}
                        <span class="text-sm text-gray-400 ml-2">${influencer.followers}</span>
                    </div>
                    <button onclick="deleteItem('${STORAGE_KEYS.INFLUENCERS}', ${influencer.id})" 
                        class="text-red-400 hover:text-red-300">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        // Render all lists
        function renderAll() {
            renderDramaList();
            renderHashtagList();
            renderInfluencerList();
        }

        // Show notification
        function showNotification(message) {
            const notification = document.createElement('div');
            notification.className = 'fixed top-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-bounce';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            renderAll();
        });
    </script>
</body>
</html>
