<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fallacy Detector — logical-fallacy warnings</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #16394b;
    --muted: rgba(22, 57, 75, 0.62);
    --faint: rgba(22, 57, 75, 0.4);
    --accent: #2b7fb8;
    --accent-deep: #1f6489;
    --surface: rgba(255, 255, 255, 0.78);
    --surface-line: rgba(43, 127, 184, 0.22);
    --low: #9c6b12;   --low-bg: rgba(214, 167, 74, 0.28);   --low-line: rgba(156, 107, 18, 0.5);
    --med: #b4551a;   --med-bg: rgba(224, 132, 72, 0.28);   --med-line: rgba(180, 85, 26, 0.5);
    --high: #b22f26;  --high-bg: rgba(210, 80, 70, 0.26);   --high-line: rgba(178, 47, 38, 0.55);
    --skybg: linear-gradient(180deg, #e9f6fd 0%, #cbe9f9 55%, #bfe3f6 100%);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--skybg);
    background-attachment: fixed;
    -webkit-font-smoothing: antialiased;
    text-align: center;
    transition: background 0.6s ease;
  }

  /* ===== INPUT SCREEN ===== */
  .wrap { max-width: 720px; margin: 0 auto; padding: 24px 22px 90px; }
  .hero {
    min-height: 84vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  header { margin-bottom: 30px; }
  header h1 {
    font-family: "Cormorant Garamond", serif; font-weight: 300;
    font-size: clamp(2.8rem, 8vw, 4.8rem); line-height: 1; letter-spacing: -0.01em;
    margin: 0; color: var(--ink);
  }
  header h1 em { font-style: italic; color: var(--accent); }

  .field { position: relative; width: 100%; max-width: 620px; margin: 0 auto; }
  .ph {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 0 26px; pointer-events: none;
    color: rgba(22, 57, 75, 0.42); font-size: 15px; line-height: 1.6;
    transition: opacity 0.2s ease;
  }
  .field.has-content .ph { opacity: 0; }
  textarea {
    width: 100%; min-height: 168px; resize: vertical; display: block; margin: 0; text-align: left;
    padding: 18px 20px; border-radius: 16px;
    background: var(--surface); border: 1px solid var(--surface-line);
    color: var(--ink); font-family: "Manrope", sans-serif; font-size: 15px; line-height: 1.7;
    box-shadow: 0 10px 34px rgba(43, 127, 184, 0.14);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  textarea:focus {
    outline: none; border-color: rgba(43, 127, 184, 0.55);
    box-shadow: 0 10px 40px rgba(43, 127, 184, 0.24);
  }
  .controls { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
  button {
    font-family: "Manrope", sans-serif; font-weight: 600; font-size: 14px; letter-spacing: 0.01em;
    cursor: pointer; padding: 12px 30px; border-radius: 999px; border: 1px solid transparent;
    transition: background 0.25s, border-color 0.25s, box-shadow 0.25s, opacity 0.2s, transform 0.15s;
  }
  button.primary { background: var(--accent); color: #fff; box-shadow: 0 8px 22px rgba(43, 127, 184, 0.32); }
  button.primary:hover { background: var(--accent-deep); transform: translateY(-1px); }
  button.ghost { background: transparent; border-color: rgba(43, 127, 184, 0.35); color: var(--accent-deep); }
  button.ghost:hover { background: rgba(43, 127, 184, 0.08); }
  button:disabled { opacity: 0.5; cursor: default; box-shadow: none; transform: none; }
  .status { color: var(--muted); font-size: 0.9rem; min-height: 1.2em; margin: 18px 0 0; }
  .spinner {
    display: inline-block; width: 13px; height: 13px; margin-right: 8px;
    border: 2px solid rgba(43, 127, 184, 0.25); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -2px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    max-width: 620px; margin: 22px auto 0; padding: 14px 18px; border-radius: 12px;
    background: var(--high-bg); color: var(--high); border: 1px solid var(--high-line);
  }

  /* ===== RESULT SCREEN ===== */
  #result-view { display: none; }
  body.results #input-view { display: none; }
  body.results #result-view { display: block; }
  .result-wrap {
    max-width: 760px; margin: 0 auto; padding: 26px 22px 100px;
    text-align: left; opacity: 0; transform: translateY(12px);
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .back {
    display: inline-flex; align-items: center; gap: 8px; margin-bottom: 26px;
    background: none; border: none; padding: 6px 4px; cursor: pointer;
    color: var(--accent-deep); font-family: "Manrope", sans-serif; font-weight: 500; font-size: 0.9rem;
    opacity: 0.75; transition: opacity 0.2s;
  }
  .back:hover { opacity: 1; }
  .back .arrow { font-size: 1.1rem; }

  .summary { margin-bottom: 30px; }
  .summary-lead {
    font-family: "Cormorant Garamond", serif; font-weight: 400;
    font-size: clamp(1.5rem, 3.6vw, 2.1rem); line-height: 1.25; color: var(--ink); margin: 0 0 14px;
  }
  .summary.clean .summary-lead { color: var(--accent-deep); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font-size: 0.8rem; font-weight: 500; padding: 4px 12px; border-radius: 999px;
    background: rgba(255, 255, 255, 0.6); border: 1px solid var(--surface-line); color: var(--ink);
  }
  .chip .x { color: var(--faint); font-weight: 400; margin-left: 3px; }

  .essay {
    background: rgba(255, 255, 255, 0.62); border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 16px; padding: 30px 32px;
    box-shadow: 0 12px 40px rgba(22, 57, 75, 0.1);
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .line { margin: 0 0 1.05em; line-height: 1.9; font-size: 1.02rem; color: var(--ink); }
  .line:last-child { margin-bottom: 0; }
  .line.gap { height: 0.4em; margin: 0; }
  .speaker { font-weight: 600; color: var(--accent-deep); }

  /* Highlighted spans + hover tooltip */
  mark {
    position: relative; border-radius: 4px; padding: 1px 2px; cursor: help;
    background: transparent; border-bottom: 2px solid; color: inherit;
  }
  mark.low { background: var(--low-bg); border-color: var(--low); }
  mark.medium { background: var(--med-bg); border-color: var(--med); }
  mark.high { background: var(--high-bg); border-color: var(--high); }
  mark .tip {
    position: absolute; left: 50%; bottom: calc(100% + 9px); transform: translateX(-50%) translateY(4px);
    width: max-content; max-width: min(300px, 78vw);
    background: #ffffff; color: var(--ink); text-align: left;
    border: 1px solid var(--surface-line); border-radius: 12px; padding: 11px 13px;
    box-shadow: 0 12px 34px rgba(22, 57, 75, 0.2);
    font-family: "Manrope", sans-serif; font-size: 0.84rem; line-height: 1.5; font-weight: 400;
    white-space: normal; opacity: 0; visibility: hidden; z-index: 60; pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  mark .tip::after {
    content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #ffffff;
  }
  mark:hover .tip, mark:focus .tip { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
  .t-type { display: block; font-weight: 700; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .t-type.low { color: var(--low); }
  .t-type.medium { color: var(--med); }
  .t-type.high { color: var(--high); }
  .t-charitable { display: block; margin-top: 7px; color: var(--muted); font-size: 0.8rem; }
  .t-charitable b { color: var(--accent-deep); }

  /* ===== INTRO OVERLAY ===== */
  #intro {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; text-align: center; padding: 24px;
    background: var(--skybg);
    opacity: 1; transition: opacity 0.8s ease;
  }
  #intro.leaving { opacity: 0; }
  #intro .title {
    margin: 0; font-family: "Cormorant Garamond", serif; font-style: italic; font-weight: 300;
    font-size: clamp(2.8rem, 9vw, 5.4rem); letter-spacing: -0.01em; color: var(--accent);
    opacity: 0; transform: translateY(16px);
    animation: introIn 1s cubic-bezier(.2,.7,.2,1) 0.2s forwards;
  }
  #intro .sub {
    margin: 0; font-family: "Manrope", sans-serif; text-transform: uppercase;
    letter-spacing: 0.5em; color: var(--muted); font-size: clamp(0.78rem, 2.4vw, 1rem); font-weight: 500;
    opacity: 0; transform: translateY(12px);
    animation: introIn 1s cubic-bezier(.2,.7,.2,1) 0.55s forwards;
  }
  @keyframes introIn { to { opacity: 1; transform: translateY(0); } }

  @media (prefers-reduced-motion: reduce) {
    body { transition: none; }
    #intro { transition: none; }
    #intro .title, #intro .sub { animation: none; opacity: 1; transform: none; }
    .result-wrap { animation: none; opacity: 1; transform: none; }
  }
</style>
</head>
<body>
<div id="intro" aria-hidden="true">
  <h1 class="title">Fallacy Detector</h1>
  <p class="sub">use wisely</p>
</div>

<!-- ===== INPUT SCREEN ===== -->
<main class="wrap" id="input-view">
  <section class="hero">
    <header>
      <h1>Fallacy <em>Detector</em></h1>
    </header>

    <div class="field">
      <textarea id="input"></textarea>
      <div class="ph" id="ph">Insert transcript of debate here to start</div>
    </div>

    <div class="controls">
      <button class="primary" id="analyze">Evaluate</button>
      <button class="ghost" id="example">Load example</button>
    </div>
    <p class="status" id="status"></p>
    <div id="error"></div>
  </section>
</main>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-view">
  <div class="result-wrap">
    <button class="back" id="back"><span class="arrow">&larr;</span> New transcript</button>
    <div class="summary" id="summary"></div>
    <div class="essay" id="essay"></div>
  </div>
</div>

<script>
const EXAMPLE = `Of course my opponent wants higher taxes — he's a career politician who has never run a business in his life, so nothing he says about the economy can be trusted. Either we cut spending immediately or the whole country collapses within a year; there is no middle ground. And if we let the government raise this one tax, next they'll tax the air we breathe. Besides, how can he lecture anyone on budgets when his own party doubled the deficit last decade?`;

const $ = (id) => document.getElementById(id);
const input = $("input"), statusEl = $("status"), errorEl = $("error"),
      analyzeBtn = $("analyze"), exampleBtn = $("example"),
      summaryEl = $("summary"), essayEl = $("essay"), backBtn = $("back");
const field = document.querySelector(".field");

function updatePlaceholder() {
  if (field) field.classList.toggle("has-content", input.value.trim().length > 0);
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));
}

// ----- Severity-weighted fallacy score (0–100) -> gradient position -----
function fallacyScore(flags) {
  const w = { low: 9, medium: 22, high: 38 };
  let s = 0;
  for (const f of flags) s += (w[f.warning_level] || 0) * Math.max(0.4, f.confidence);
  return Math.min(100, Math.round(s));
}

// Light gradient that slides green -> yellow -> red as the score rises.
function bgForScore(score) {
  const t = Math.max(0, Math.min(100, score)) / 100;
  const hue = 125 - 125 * t;               // 125 (green) -> 0 (red)
  const span = 20;                          // endpoints straddle the score hue
  const h1 = Math.max(0, hue + span);
  const h2 = Math.max(0, hue - span);
  return `linear-gradient(160deg, hsl(${h1.toFixed(0)}, 66%, 90%) 0%, hsl(${h2.toFixed(0)}, 70%, 82%) 100%)`;
}

// ----- Locate non-overlapping span ranges in the text -----
function locate(text, flags) {
  const lower = text.toLowerCase();
  const ranges = [];
  flags.forEach((flag, i) => {
    let idx = text.indexOf(flag.span);
    if (idx === -1) idx = lower.indexOf(flag.span.toLowerCase());
    if (idx !== -1) ranges.push({ start: idx, end: idx + flag.span.length, i });
  });
  ranges.sort((a, b) => a.start - b.start || (b.end - b.start) - (a.end - a.start));
  const kept = [];
  let lastEnd = 0;
  for (const r of ranges) {
    if (r.start < lastEnd) continue;
    kept.push(r);
    lastEnd = r.end;
  }
  return kept;
}

function markHtml(segment, f) {
  let tip = `<span class="tip"><span class="t-type ${f.warning_level}">`
          + `${escapeHtml(f.warning_level)} · ${escapeHtml(f.fallacy_type)}</span>`
          + escapeHtml(f.explanation);
  if (f.charitable_read) {
    tip += `<span class="t-charitable"><b>Charitable read:</b> ${escapeHtml(f.charitable_read)}</span>`;
  }
  tip += `</span>`;
  return `<mark class="${f.warning_level}" tabindex="0">${escapeHtml(segment)}${tip}</mark>`;
}

// Highlight the portion of one line that overlaps any located range.
function highlightLine(lineText, lineStart, ranges, flags) {
  let html = "", cursor = 0;
  for (const r of ranges) {
    const s = r.start - lineStart, e = r.end - lineStart;
    if (e <= 0 || s >= lineText.length) continue;
    const cs = Math.max(0, s), ce = Math.min(lineText.length, e);
    if (cs < cursor) continue;
    html += escapeHtml(lineText.slice(cursor, cs));
    html += markHtml(lineText.slice(cs, ce), flags[r.i]);
    cursor = ce;
  }
  html += escapeHtml(lineText.slice(cursor));
  return html;
}

// Render the transcript as a cleaned-up essay / debate script with highlights.
function renderEssay(text, flags) {
  const ranges = locate(text, flags);
  const lines = text.split(/\r?\n/);
  let offset = 0, out = "";
  const speakerRe = /^(\s*[A-Za-z][\w .'’-]{0,28}:\s+)/;
  for (const line of lines) {
    const lineStart = offset;
    offset += line.length + 1; // account for the split newline
    if (!line.trim()) { out += `<div class="line gap"></div>`; continue; }

    const m = line.match(speakerRe);
    if (m) {
      const head = m[1];
      const rest = line.slice(head.length);
      out += `<p class="line"><span class="speaker">${escapeHtml(head)}</span>`
           + highlightLine(rest, lineStart + head.length, ranges, flags) + `</p>`;
    } else {
      out += `<p class="line">${highlightLine(line, lineStart, ranges, flags)}</p>`;
    }
  }
  return out;
}

function renderSummary(flags) {
  if (!flags.length) {
    return `<p class="summary-lead">No fallacies found — this reads clean.</p>`;
  }
  const counts = {};
  for (const f of flags) counts[f.fallacy_type] = (counts[f.fallacy_type] || 0) + 1;
  const chips = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([type, c]) => `<span class="chip">${escapeHtml(type)}${c > 1 ? `<span class="x">×${c}</span>` : ""}</span>`)
    .join("");
  const n = flags.length;
  return `<p class="summary-lead">We found ${n} possible ${n === 1 ? "fallacy" : "fallacies"}:</p>`
       + `<div class="chips">${chips}</div>`;
}

function showResults(data) {
  document.body.style.background = bgForScore(fallacyScore(data.flags));
  summaryEl.className = "summary" + (data.flags.length ? "" : " clean");
  summaryEl.innerHTML = renderSummary(data.flags);
  essayEl.innerHTML = renderEssay(data.text, data.flags);
  document.body.classList.add("results");
  window.scrollTo(0, 0);
}

function showInput() {
  document.body.classList.remove("results");
  document.body.style.background = "";  // revert to the sky-blue CSS default
  window.scrollTo(0, 0);
}

async function analyze() {
  const text = input.value.trim();
  errorEl.innerHTML = "";
  if (!text) { statusEl.textContent = "Enter some text first."; return; }

  analyzeBtn.disabled = true;
  statusEl.innerHTML = `<span class="spinner"></span>Analyzing… (two passes, this can take a moment)`;

  try {
    const resp = await fetch("/api/check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      errorEl.innerHTML = `<div class="error">${escapeHtml(data.error || "Something went wrong.")}</div>`;
      return;
    }
    statusEl.textContent = "";
    showResults(data);
  } catch (e) {
    errorEl.innerHTML = `<div class="error">Network error: ${escapeHtml(String(e))}</div>`;
  } finally {
    analyzeBtn.disabled = false;
  }
}

analyzeBtn.addEventListener("click", analyze);
exampleBtn.addEventListener("click", () => { input.value = EXAMPLE; updatePlaceholder(); input.focus(); });
input.addEventListener("input", updatePlaceholder);
input.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") analyze();
});
backBtn.addEventListener("click", showInput);

// Intro overlay: hold the words, then fade out to reveal the site.
(function () {
  const intro = document.getElementById("intro");
  if (!intro) return;
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const hold = reduce ? 500 : 1900;
  const remove = () => intro.remove();
  setTimeout(() => {
    intro.classList.add("leaving");
    intro.addEventListener("transitionend", remove, { once: true });
    setTimeout(remove, 1200);
  }, hold);
})();
</script>
</body>
</html>
